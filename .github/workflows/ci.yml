name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        # --test-threads=1: native tests compile a binary to a shared temp path
        # then exec it; in parallel they race (Text-file-busy, or a
        # stack-overflow abort that downs the whole process). Serial only.
        # (Deep recursive emit over the self-source needs a 64 MiB stack in
        # debug builds — provided repo-wide by RUST_MIN_STACK in
        # .cargo/config.toml; some older tests also set Builder::stack_size.)
        run: cargo test --verbose -- --test-threads=1

      - name: Verify examples
        run: |
          cargo run -- examples/invoices.verbose
          cargo run -- examples/business.verbose
          cargo run -- examples/clients.verbose
          cargo run -- examples/collections.verbose
          cargo run -- examples/pricing.verbose
          cargo run -- examples/deadcode.verbose
          cargo run -- examples/showcase.verbose
          cargo run -- examples/reactions.verbose
          cargo run -- examples/app.verbose

      - name: Benchmark
        run: cargo run -- examples/invoices.verbose --benchmark --run important_invoice

  # The self-hosting crown jewel: the compiler emitted by the compiler reproduces
  # its entire self byte-for-byte (R0 fixed point), emits the whole real source
  # with no reorder (R1), and its emitted binaries run correct across the construct
  # space (R2). Dedicated job (kept off the parallel test job so it doesn't share
  # its memory). Since the arena_scope reclaim landed the self-hosted emitter peaks
  # ~2.55 GiB / ~11 s (was 8.7 GiB / 70 s — see docs/self-hosting-arena-scope-design.md),
  # cheap enough to GATE PRs, not just post-merge. Runs on push AND pull_request.
  self-hosting-bootstrap:
    name: Self-hosting bootstrap validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Two-generation bootstrap (R0 fixed point + R1 whole-source + R2 corpus)
        # ulimit -s unlimited: the emit recurses over the ~855 KB source (src_blob).
        # The test's own emit shell-outs also raise it, so this is belt-and-suspenders.
        run: |
          ulimit -s unlimited
          cargo test --release -- --ignored --test-threads=1 two_generation_bootstrap_fixed_point
