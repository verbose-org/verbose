name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        # --test-threads=1: native tests compile a binary to a shared temp path
        # then exec it; in parallel they race (Text-file-busy, or a
        # stack-overflow abort that downs the whole process). Serial only.
        # (Deep recursive emit over the self-source needs a 64 MiB stack in
        # debug builds — provided repo-wide by RUST_MIN_STACK in
        # .cargo/config.toml; some older tests also set Builder::stack_size.)
        run: cargo test --verbose -- --test-threads=1

      - name: Verify examples
        run: |
          cargo run -- examples/invoices.verbose
          cargo run -- examples/business.verbose
          cargo run -- examples/clients.verbose
          cargo run -- examples/collections.verbose
          cargo run -- examples/pricing.verbose
          cargo run -- examples/deadcode.verbose
          cargo run -- examples/showcase.verbose
          cargo run -- examples/reactions.verbose
          cargo run -- examples/app.verbose

      - name: Benchmark
        run: cargo run -- examples/invoices.verbose --benchmark --run important_invoice

  # The self-hosting crown jewel: the compiler emitted by the compiler reproduces
  # its entire self byte-for-byte (R0 fixed point), emits the whole real source
  # with no reorder (R1), and its emitted binaries run correct across the construct
  # space (R2). Dedicated job (kept off the parallel test job so it doesn't share
  # its memory). MEMORY (measured 2026-07, corrected from a stale 2.55 GiB note):
  # the self-hosted emitter's arena is non-reclaiming at runtime, so gen1's peak
  # RSS grows superlinearly with the self-source — ~2.55 GiB at ~509 rules (the
  # arena_scope era, PR #105) up to ~15.4 GiB at ~690 rules now. That is ~94% of a
  # 16 GiB ubuntu-latest runner: the fixed point is at the CI memory EDGE, and the
  # durable fix is teaching the self-hosted emitter to reclaim like native.rs does
  # (the PR #94 analog; Rust side went 247 MB -> 32 MB). Until that chantier lands,
  # each slice that grows the self-source nudges this test closer to OOM; if it
  # OOM-kills here, that is the wall, not a logic failure. Runs on push AND PR.
  self-hosting-bootstrap:
    name: Self-hosting bootstrap validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Two-generation bootstrap (fixed point R0/R1/R2 + the composite demo)
        # The `two_generation` filter runs BOTH the fixed-point test
        # (gen1==gen2, whole-source, corpus) AND the composite-demo test
        # (examples/expense_audit.verbose compiled end-to-end by the verifying
        # gen1, plus the refusal of unverified source).
        # ulimit -s unlimited: the emit recurses over the ~855 KB source
        # (src_blob). The tests' own emit shell-outs also raise it, so this is
        # belt-and-suspenders.
        run: |
          ulimit -s unlimited
          cargo test --release -- --ignored --test-threads=1 two_generation
