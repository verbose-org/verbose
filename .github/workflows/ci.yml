name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        # Single-threaded: many native tests compile a binary to a shared temp
        # path then exec it; in parallel they race (one test overwrites the
        # executable another is running -> Text-file-busy, or a stack-overflow
        # abort that takes the whole process down). Serial is deterministic
        # (390/390) — these tests spawn subprocesses and aren't thread-safe.
        run: cargo test --verbose -- --test-threads=1

      - name: Verify examples
        run: |
          cargo run -- examples/invoices.verbose
          cargo run -- examples/business.verbose
          cargo run -- examples/clients.verbose
          cargo run -- examples/collections.verbose
          cargo run -- examples/pricing.verbose
          cargo run -- examples/deadcode.verbose
          cargo run -- examples/showcase.verbose
          cargo run -- examples/reactions.verbose
          cargo run -- examples/app.verbose

      - name: Benchmark
        run: cargo run -- examples/invoices.verbose --benchmark --run important_invoice
