# Generated by cidx generate github
# Source of truth: cidx.toml
#
# Regenerate with: cidx generate github -o .github/workflows/cidx.yml

name: CIDX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Install CIDX
        run: |
          mkdir -p bin
          go install github.com/cidx-org/cidx/cmd/cidx@latest
          cp "$(go env GOPATH)/bin/cidx" bin/cidx
      - uses: actions/upload-artifact@v7
        with:
          name: cidx-binary
          path: bin/cidx
          retention-days: 1

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: [bootstrap]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: cidx-binary
          path: bin
      - run: chmod +x bin/cidx
      - name: Run security
        run: ./bin/cidx run security

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [bootstrap]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: cidx-binary
          path: bin
      - run: chmod +x bin/cidx
      - name: Run test
        run: ./bin/cidx run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [bootstrap]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: cidx-binary
          path: bin
      - run: chmod +x bin/cidx
      - name: Run build
        run: ./bin/cidx run build

