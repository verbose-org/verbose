# Generated by cidx generate github
# Source of truth: cidx.toml
#
# Regenerate with: cidx generate github -o .github/workflows/cidx.yml

name: CIDX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bootstrap:
    name: Bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      # cidx isn't part of this repo (it's the tool, we're the user).
      # Install from upstream, pin the tag, copy into bin/ for upload.
      # The default `cidx generate github` template assumes cidx's own
      # repo layout (./cmd/cidx); this patch is the bridge for
      # external projects.
      - name: Install CIDX
        run: |
          mkdir -p bin
          go install github.com/cidx-org/cidx/cmd/cidx@v1.6.2
          cp "$(go env GOPATH)/bin/cidx" bin/cidx
      - uses: actions/upload-artifact@v4
        with:
          name: cidx-binary
          path: bin/cidx
          retention-days: 1

  security:
    name: Security
    runs-on: ubuntu-latest
    needs: [bootstrap]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: cidx-binary
          path: bin
      - run: chmod +x bin/cidx
      - name: Run security
        run: ./bin/cidx run security

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [bootstrap]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cidx-binary
          path: bin
      - run: chmod +x bin/cidx
      - name: Run test
        run: ./bin/cidx run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [bootstrap]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cidx-binary
          path: bin
      - run: chmod +x bin/cidx
      - name: Run build
        run: ./bin/cidx run build

