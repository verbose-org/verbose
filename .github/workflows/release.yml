name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # Mirror the ci.yml hardening (2026-06-02): the native suite writes ELF
      # binaries to /tmp and spawns them; parallel test threads race on
      # ETXTBSY ("Text file busy"), and musl debug builds overflow the default
      # stack on recursive emit. Single-threaded + 32MB stack fixes both.
      RUST_MIN_STACK: "32000000"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test -- --test-threads=1

      - name: Package binary
        run: |
          cp target/release/verbosec verbosec-linux-x86_64
          chmod +x verbosec-linux-x86_64
          tar czf verbosec-linux-x86_64.tar.gz verbosec-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            verbosec-linux-x86_64.tar.gz
          body: |
            ## Verbose ${{ github.ref_name }}

            Download `verbosec-linux-x86_64.tar.gz`, extract, and run:

            ```bash
            tar xzf verbosec-linux-x86_64.tar.gz
            ./verbosec-linux-x86_64 --version
            ```

            No Rust installation needed. Zero dependencies.

            See [README](https://github.com/verbose-org/verbose#getting-started) for usage.
