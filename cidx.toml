# CIDX Configuration
# Auto-detected: Rust project
#
# Edit to match your needs. Run 'cidx preset list' for all available tools.
# Run 'cidx validate' to check, 'cidx run ci' to execute.

[security]
containers = ["trivy", "gitleaks", "cargo-audit"]

# `code` phase deferred entirely for this first cidx integration.
# The four stock containers (clippy, rustfmt, prettier, commitizen)
# all enforce disciplines Verbose has never adopted:
#   - clippy -D warnings → 81 warnings on existing source
#   - rustfmt --check → no rustfmt config, would reformat existing code
#   - prettier --check → 43 .md/.json/.html files don't match prettier style
#   - commitizen → past commit messages aren't Conventional Commits
# Each is its own slice (intentional code-quality migration). Re-add
# them one at a time as those slices land.

[test]
containers = ["cargo-test"]

[build]
containers = ["cargo-build"]

[pipelines.ci]
phases = ["security", "test", "build"]

[pipelines.pr]
phases = ["security", "test"]

# The default cidx Rust presets pin dhi.io/rust:1.83-alpine3.21, which
# isn't on a public registry. Override to the official Docker Hub image
# so anyone running this CI locally / in GitHub Actions can pull it.
[containers.cargo-audit]
image = "rust:alpine"

[containers.clippy]
image = "rust:alpine"
# rust:alpine pre-installs the toolchain at /usr/local/rustup. The preset
# default RUSTUP_HOME=/tmp/rustup makes rustup look in an empty dir and fail
# with "could not choose a version of rustup". Point at the image's default.
env = { RUSTUP_HOME = "/usr/local/rustup", CARGO_HOME = "/usr/local/cargo" }

[containers.rustfmt]
image = "rust:alpine"
env = { RUSTUP_HOME = "/usr/local/rustup", CARGO_HOME = "/usr/local/cargo" }

[containers.cargo-test]
image = "rust:alpine"
# RUST_MIN_STACK: this image is Alpine/musl, whose default THREAD stack is tiny
# (~128 KB) vs glibc's 8 MB. Tests that call compile_native (deep recursive
# emit) on a cargo worker thread overflow that musl stack — green on a glibc
# host, red here. 32 MB matches what the heaviest emit needs.
# RUST_TEST_THREADS=1: many native tests compile a binary to a shared temp path
# then exec it; in parallel they race (Text-file-busy, or a stack-overflow
# abort that takes the whole process down). Serial is deterministic (390/390).
env = { RUST_TEST_THREADS = "1", RUST_MIN_STACK = "33554432" }

[containers.cargo-build]
image = "rust:alpine"
